<!DOCTYPE html>
<html lang="sl">
<head>

<title>Vnos 1/ — Tip</title>
<link rel="stylesheet" href="styles.css">
<style>

  .steps .seg.on { background:var(--accent); }
  .steptitle { padding:0 20px 6px; font-size:13px; color:var(--muted); font-weight:600; }

<body>

    <div style="font-size:12.5px;color:var(--muted);text-align:center;margin:14px 6px;">
