<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domov — C+A strnjeno</title>
<link rel="stylesheet" href="styles.css">
<style>
  .alert { display:flex; align-items:center; gap:10px; background:#fce8e6; border:1px solid #f3c0bb;
           border-radius:16px; padding:13px 14px; margin-bottom:12px; color:#b3261e; font-weight:600; font-size:14px; cursor:pointer; }
  .alert .arr { margin-left:auto; font-size:13px; }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__notch"></div>
  <div class="statusbar"><span>9:41</span><span class="right">📶 🔋</span></div>

  <div class="appbar">
    <div><h1>Dober dan 🌿</h1><div class="sub">torek, 1. junij</div></div>
    <div class="icon-btn">⚙️</div>
  </div>

  <div class="content">
    <div class="weather">
      <span class="ico">🌧️</span>
      <div><div class="temp">16°</div><div class="meta">Dež · nocoj 8 mm<br>veter 5 km/h</div></div>
      <div class="days"><div class="day">sre<b>☀️</b>24°</div><div class="day">čet<b>🌦️</b>18°</div><div class="day">pet<b>🌧️</b>15°</div></div>
    </div>

    <!-- STRNJENO (privzeto): kompakten pas; ▾ namiguje, da se razširi -->
    <div class="alert">⚠️ 3 zamujena opravila <span class="arr">▾ pokaži</span></div>

    <div class="section-title">Danes</div>
    <div class="card" style="padding:6px 16px;">
      <div class="list-item">
        <div class="avatar">🌱</div>
        <div class="li-main"><div class="li-title">Pokositi trato</div><div class="li-sub">🌱 Trata zadaj</div></div>
        <div class="li-trail">🔔 ⏱️ 7:00</div>
      </div>
    </div>

    <div class="section-title">Nazadnje</div>
    <div class="card" style="padding:6px 16px;">
      <div class="list-item">
        <div class="avatar">🧪</div>
        <div class="li-main"><div class="li-title">Folirano gnojenje</div><div class="li-sub">🍅 paradižnik · 🥬 solata</div></div>
        <div class="li-trail">✓ danes</div>
      </div>
    </div>
  </div>

  <div class="fab">+</div>
  <nav class="bottomnav">
    <div class="nav-item active"><span class="ico">🏠</span>Domov</div>
    <div class="nav-item"><span class="ico">📋</span>Opravila</div>
    <div class="nav-item"><span class="ico">📅</span>Dnevnik</div>
    <div class="nav-item"><span class="ico">🪴</span>Vrt</div>
  </nav>
</div>
</body>
</html>
