<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splash</title>
<link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
<style>
  .splash {
    position:absolute; inset:0;
    background: radial-gradient(120% 100% at 50% 0%, #3a9a57 0%, #2e7d32 45%, #1f5d28 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .hexbg { position:absolute; inset:0; opacity:.10; }
  .brand { position:relative; z-index:2; text-align:center; color:#fff; }
  .logomark { filter: drop-shadow(0 10px 24px rgba(0,0,0,.25)); }
  .wordmark { font-family:'Plus Jakarta Sans',sans-serif; font-size:38px; font-weight:800; letter-spacing:-1px; margin-top:24px; }
  .tagline { font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:600; opacity:.92; margin-top:8px; letter-spacing:.2px; }
  .dots { position:absolute; bottom:70px; left:0; right:0; display:flex; gap:8px; justify-content:center; z-index:2; }
  .dots span { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.55); }
  .dots span:nth-child(2){ background:rgba(255,255,255,.85); }
  .footnote { position:absolute; bottom:34px; left:0; right:0; text-align:center; color:rgba(255,255,255,.7); font-size:12px; z-index:2; }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__notch"></div>

  <div class="splash">
    <!-- H3 šesterokotna mreža v ozadju -->
    <svg class="hexbg" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hex" width="56" height="64" patternUnits="userSpaceOnUse" patternTransform="scale(1.3)">
          <path d="M28 1 L55 16 L55 48 L28 63 L1 48 L1 16 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
        </pattern>
      </defs>
      <rect width="390" height="844" fill="url(#hex)"/>
    </svg>

    <a href="15-onboarding.html" style="position:absolute;inset:0;z-index:5;"></a>

    <div class="brand">
      <!-- Logo: list znotraj šesterokotnika (vir: docs/brand/assets/logomark.svg) -->
      <svg class="logomark" width="124" height="124" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <!-- šesterokotnik (H3 celica) -->
        <path d="M60 8 L106 34 L106 86 L60 112 L14 86 L14 34 Z" fill="#ffffff" stroke-linejoin="round"/>
        <!-- list = vrt -->
        <path d="M60 30 C39 40 35 68 49 88 C57 75 76 69 84 46 C72 50 59 56 53 69 C53 53 55 40 60 30 Z" fill="#2e7d32"/>
        <!-- žila lista (subtilna, brez kljukice) -->
        <path d="M60 34 C56 50 54 66 50 83" fill="none" stroke="#205A28" stroke-width="3" stroke-linecap="round"/>
      </svg>

      <div class="wordmark">Tendask</div>
      <div class="tagline">Tvoj vrtni dnevnik 🌿</div>
    </div>

    <div class="dots"><span></span><span></span><span></span></div>
    <div class="footnote">v1 (MVP)</div>
  </div>
</div>
</body>
</html>
