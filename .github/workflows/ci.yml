name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate translations (slang)
        run: dart run slang

      - name: Generate code (build_runner)
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
